# Shared writable directories for all users
# Every user's ~/.local/share/<type> is bind-mounted from /var/share/<type>
# (seeded via /etc/skel + ark-bindmounts.service / ark-bindmounts-pam PAM hook),
# so shared data lands on the dedicated subvolume.
d /var/share            0755 root root -
d /var/share/fonts      1777 root root -
d /var/share/icons      1777 root root -
d /var/share/themes     1777 root root -
d /var/share/backgrounds 1777 root root -
d /var/share/sounds     1777 root root -
d /var/share/applications 1777 root root -
