# Rootless container storage lives on the dedicated /orundum btrfs subvolume.
# Every user's ~/.local/share/containers is a symlink into /orundum/containers
# (seeded via /etc/skel), so images/containers land on the dedicated subvolume.
# World-writable + sticky (1777, like /tmp) so any user can use it.
d /orundum            0755 root root -
d /orundum/containers 1777 root root -
