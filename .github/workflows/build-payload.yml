name: Build ark Payload

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  CACHE_KEY_PREFIX: archlinux-digest

jobs:
  check-digest:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    outputs:
      needs-build: ${{ steps.decide.outputs.needs-build }}
      reason: ${{ steps.decide.outputs.reason }}
      digest: ${{ steps.digest.outputs.value }}
    steps:
      - uses: actions/checkout@v6

      - name: Get current archlinux:latest digest
        id: digest
        run: |
          DIGEST=$(curl -sS \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
            "https://registry.hub.docker.com/v2/library/archlinux/manifests/latest" 2>/dev/null | \
            jq -r '.config.digest // empty')
          echo "value=${DIGEST:-unknown}" >> $GITHUB_OUTPUT
          echo "Current archlinux digest: ${DIGEST:-unknown}"

      - name: Restore cached digest
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: digest-cache.txt
          key: ${{ env.CACHE_KEY_PREFIX }}-${{ github.run_id }}
          restore-keys: |
            ${{ env.CACHE_KEY_PREFIX }}-
          fail-on-cache-miss: false

      - name: Decide whether to build
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "needs-build=true" >> $GITHUB_OUTPUT
            echo "reason=push" >> $GITHUB_OUTPUT
            exit 0
          fi

          CURRENT="${{ steps.digest.outputs.value }}"
          CACHED=""
          CACHED_TS=""
          if [ -f digest-cache.txt ]; then
            CACHED=$(head -1 digest-cache.txt)
            CACHED_TS=$(tail -1 digest-cache.txt)
          fi

          NOW=$(date +%s)
          needs_build="false"
          reason="skip-no-change"

          if [ -z "$CACHED" ]; then
            needs_build="true"
            reason="initial-build"
          elif [ "$CURRENT" != "$CACHED" ]; then
            needs_build="true"
            reason="update-archlinux"
          elif [ -n "$CACHED_TS" ] && [ $((NOW - CACHED_TS)) -gt $((7 * 86400)) ]; then
            needs_build="true"
            reason="weekly-fallback"
          fi

          echo "needs-build=$needs_build" >> $GITHUB_OUTPUT
          echo "reason=$reason" >> $GITHUB_OUTPUT

      - name: Set dynamic run name
        if: steps.decide.outputs.needs-build == 'true'
        run: |
          curl -sS -X PATCH \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d "{\"name\":\"Build - ${{ steps.decide.outputs.reason }}\"}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-payload:
    needs: check-digest
    if: needs.check-digest.outputs.needs-build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant: [ark, ark-nvidia, ark-zen, ark-zen-nvidia, ark-lts, ark-lts-nvidia, ark-hardened, ark-hardened-nvidia]
    steps:
      - uses: actions/checkout@v6
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Set up dependencies
        run: sudo apt-get update && sudo apt-get install -y podman wget
      - name: Download AUR packages
        run: |
          mkdir -p aur-packages
          cd aur-packages
          curl -sL https://github.com/zamkara/ark-aur/releases/expanded_assets/latest | grep -o 'href="[^"]*\.pkg\.tar\.zst"' | cut -d'"' -f2 | sed 's|^|https://github.com|' | wget -qi - || true
          cd ..
      - name: Download Alga Package
        run: |
          cd aur-packages
          curl -sL https://github.com/zamkara/alga/releases/expanded_assets/latest | grep -o 'href="[^"]*\.pkg\.tar\.zst"' | cut -d'"' -f2 | sed 's|^|https://github.com|' | wget -qi - || true
          python3 - <<'PYEOF'
          import os, re
          pkgs = [f for f in os.listdir('.') if f.endswith('.pkg.tar.zst')]
          best = {}
          for f in pkgs:
              m = re.match(r'^(.+)-([^-]+)-([^-]+)-([^-]+)\.pkg\.tar\.zst$', f)
              if not m:
                  continue
              name, ver, rel, arch = m.group(1), m.group(2), m.group(3), m.group(4)
              key = name
              cur_ver = best.get(key)
              if cur_ver is None or (int(rel) > int(re.match(r'^(.+)-([^-]+)-([^-]+)-([^-]+)\.pkg\.tar\.zst$', cur_ver).group(3))):
                  best[key] = f
          keep = set(best.values())
          for f in pkgs:
              if f not in keep:
                  print(f"Removing older duplicate: {f}")
                  os.remove(f)
          print("Final packages:", sorted(keep))
          PYEOF
          echo "Final packages in dir:"
          ls -lh
          cd ..
      - name: Download Prebuilt Pacman Cache
        run: |
          mkdir -p pacman-cache
          for part in aa ab ac ad ae af; do
            wget -q https://github.com/zamkara/ark-aur/releases/download/latest/pacman-cache.tar.gz.part-$part || break
          done
          if ls pacman-cache.tar.gz.part-* 1>/dev/null 2>&1; then
            cat pacman-cache.tar.gz.part-* > pacman-cache.tar.gz
            tar -xzf pacman-cache.tar.gz -C pacman-cache/
            rm pacman-cache.tar.gz.part-* pacman-cache.tar.gz
          fi
      - name: Cache Pacman Payload
        uses: actions/cache@v4
        with:
          path: pacman-cache/
          key: ${{ runner.os }}-pacman-payload-${{ matrix.variant }}-${{ hashFiles('Containerfile') }}
          restore-keys: |
            ${{ runner.os }}-pacman-payload-${{ matrix.variant }}-
            ${{ runner.os }}-pacman-payload-
      - name: Prepare Cache Dir
        run: mkdir -p pacman-cache
      - name: Build custom ark image with bootupd
        run: |
          sudo podman build -v $(pwd)/pacman-cache:/var/cache/pacman/pkg --squash-all --build-arg VARIANT=${{ matrix.variant }} -t ghcr.io/${{ github.repository }}:${{ matrix.variant }} -f Containerfile .
          sudo chown -R $USER:$USER pacman-cache/
      - name: Log in to the Container registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Push payload image to GHCR
        run: sudo podman push ghcr.io/${{ github.repository }}:${{ matrix.variant }}

  update-cache:
    needs: [check-digest, build-payload]
    if: |
      !cancelled() &&
      needs.check-digest.outputs.needs-build == 'true' &&
      needs.build-payload.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Prepare cache content
        run: |
          echo "${{ needs.check-digest.outputs.digest }}" > digest-cache.txt
          date +%s >> digest-cache.txt
          cat digest-cache.txt

      - name: Save digest cache
        uses: actions/cache/save@v4
        with:
          path: digest-cache.txt
          key: ${{ env.CACHE_KEY_PREFIX }}-${{ github.run_id }}
