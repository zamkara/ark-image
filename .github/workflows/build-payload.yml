name: Build ark Payload

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force build regardless of digest'
        default: true
        type: boolean

env:
  CACHE_KEY_PREFIX: archlinux-digest

jobs:
  check-digest:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    outputs:
      needs-build: ${{ steps.decide.outputs.needs-build }}
      reason: ${{ steps.decide.outputs.reason }}
      digest: ${{ steps.digest.outputs.value }}
      aur-sha: ${{ steps.aur.outputs.sha }}
      alga-sha: ${{ steps.alga.outputs.sha }}
    steps:
      - uses: actions/checkout@v6

      - name: Get current archlinux:latest digest
        id: digest
        run: |
          DIGEST=$(curl -sS \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
            "https://registry.hub.docker.com/v2/library/archlinux/manifests/latest" 2>/dev/null | \
            jq -r '.config.digest // empty')
          echo "value=${DIGEST:-unknown}" >> $GITHUB_OUTPUT
          echo "Current archlinux digest: ${DIGEST:-unknown}"

      - name: Check ark-aur latest commit
        id: aur
        run: |
          SHA=$(curl -sS -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/zamkara/ark-aur/commits/main 2>/dev/null | \
            jq -r '.sha // empty')
          echo "sha=${SHA:-unknown}" >> $GITHUB_OUTPUT
          if [ -n "$SHA" ]; then
            STATUS=$(curl -sS -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/zamkara/ark-aur/commits/$SHA/status 2>/dev/null | \
              jq -r '.state // empty')
            echo "ci=${STATUS:-unknown}" >> $GITHUB_OUTPUT
          else
            echo "ci=unknown" >> $GITHUB_OUTPUT
          fi
          echo "ark-aur: sha=$SHA ci=$STATUS"

      - name: Check alga latest commit
        id: alga
        run: |
          SHA=$(curl -sS -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/zamkara/alga/commits/main 2>/dev/null | \
            jq -r '.sha // empty')
          echo "sha=${SHA:-unknown}" >> $GITHUB_OUTPUT
          if [ -n "$SHA" ]; then
            STATUS=$(curl -sS -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/zamkara/alga/commits/$SHA/status 2>/dev/null | \
              jq -r '.state // empty')
            echo "ci=${STATUS:-unknown}" >> $GITHUB_OUTPUT
          else
            echo "ci=unknown" >> $GITHUB_OUTPUT
          fi
          echo "alga: sha=$SHA ci=$STATUS"

      - name: Restore cached digest
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: digest-cache.txt
          key: ${{ env.CACHE_KEY_PREFIX }}-${{ github.run_id }}
          restore-keys: |
            ${{ env.CACHE_KEY_PREFIX }}-
          fail-on-cache-miss: false

      - name: Decide whether to build
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "needs-build=true" >> $GITHUB_OUTPUT
            echo "reason=push" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            echo "needs-build=true" >> $GITHUB_OUTPUT
            echo "reason=force" >> $GITHUB_OUTPUT
            exit 0
          fi

          CURRENT="${{ steps.digest.outputs.value }}"
          AUR_CURRENT="${{ steps.aur.outputs.sha }}"
          AUR_CI="${{ steps.aur.outputs.ci }}"
          ALGA_CURRENT="${{ steps.alga.outputs.sha }}"
          ALGA_CI="${{ steps.alga.outputs.ci }}"

          CACHED=""
          AUR_CACHED=""
          ALGA_CACHED=""
          CACHED_TS=""
          if [ -f digest-cache.txt ]; then
            CACHED=$(sed -n '1p' digest-cache.txt)
            AUR_CACHED=$(sed -n '2p' digest-cache.txt)
            ALGA_CACHED=$(sed -n '3p' digest-cache.txt)
            CACHED_TS=$(sed -n '4p' digest-cache.txt)
          fi

          NOW=$(date +%s)
          needs_build="false"
          reason="skip-no-change"

          if [ -z "$CACHED" ]; then
            needs_build="true"
            reason="initial-build"
          elif [ "$CURRENT" != "$CACHED" ]; then
            needs_build="true"
            reason="update-archlinux"
          elif [ "$AUR_CURRENT" != "$AUR_CACHED" ] && [ "$AUR_CI" = "success" ]; then
            needs_build="true"
            reason="update-aur"
          elif [ "$ALGA_CURRENT" != "$ALGA_CACHED" ] && [ "$ALGA_CI" = "success" ]; then
            needs_build="true"
            reason="update-alga"
          elif [ -n "$CACHED_TS" ] && [ $((NOW - CACHED_TS)) -gt $((7 * 86400)) ]; then
            needs_build="true"
            reason="weekly-fallback"
          fi

          echo "archlinux: cached=$CACHED current=$CURRENT"
          echo "ark-aur: cached=$AUR_CACHED current=$AUR_CURRENT ci=$AUR_CI"
          echo "alga: cached=$ALGA_CACHED current=$ALGA_CURRENT ci=$ALGA_CI"

          echo "needs-build=$needs_build" >> $GITHUB_OUTPUT
          echo "reason=$reason" >> $GITHUB_OUTPUT

      - name: Set dynamic run name
        if: steps.decide.outputs.needs-build == 'true'
        run: |
          curl -sS -X PATCH \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d "{\"name\":\"Build - ${{ steps.decide.outputs.reason }}\"}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-payload:
    needs: check-digest
    if: needs.check-digest.outputs.needs-build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant: [ark, ark-nvidia, ark-zen, ark-zen-nvidia, ark-lts, ark-lts-nvidia, ark-hardened, ark-hardened-nvidia, ark-apex, ark-apex-nvidia, ark-apex-bore, ark-apex-bore-nvidia, ark-apex-lts, ark-apex-lts-nvidia, ark-apex-hardened, ark-apex-hardened-nvidia]
    steps:
      - uses: actions/checkout@v6
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Set up dependencies
        run: sudo apt-get update && sudo apt-get install -y podman wget
      - name: Download AUR packages
        run: |
          mkdir -p .github/aur-packages
          cd .github/aur-packages
          python3 << 'EOF' | wget -qi -
          import urllib.request, json
          req = urllib.request.Request("https://api.github.com/repos/zamkara/ark-aur/releases/latest", headers={"User-Agent": "Antigravity"})
          data = json.loads(urllib.request.urlopen(req).read().decode())
          for a in data.get("assets", []):
              if a["name"].endswith(".pkg.tar.zst") or a["name"].endswith(".pkg.tar.xz"):
                  print(a["browser_download_url"])
          EOF
          cd ../..
      - name: Download Alga Package
        run: |
          cd .github/aur-packages
          python3 << 'EOF' | wget -qi -
          import urllib.request, json
          req = urllib.request.Request(
              "https://api.github.com/repos/zamkara/alga/releases/latest",
              headers={"User-Agent": "Antigravity"}
          )
          data = json.loads(urllib.request.urlopen(req).read().decode())
          for a in data.get("assets", []):
              if a["name"].endswith(".pkg.tar.zst") and "debug" not in a["name"]:
                  print(a["browser_download_url"])
                  break
          EOF
          python3 - <<'PYEOF'
          import os, re
          pkgs = [f for f in os.listdir('.') if f.endswith('.pkg.tar.zst')]
          best = {}
          for f in pkgs:
              m = re.match(r'^(.+)-([^-]+)-([^-]+)-([^-]+)\.pkg\.tar\.zst$', f)
              if not m:
                  continue
              name, ver, rel, arch = m.group(1), m.group(2), m.group(3), m.group(4)
              key = name
              cur_ver = best.get(key)
              if cur_ver is None or (int(rel) > int(re.match(r'^(.+)-([^-]+)-([^-]+)-([^-]+)\.pkg\.tar\.zst$', cur_ver).group(3))):
                  best[key] = f
          keep = set(best.values())
          for f in pkgs:
              if f not in keep:
                  print(f"Removing older duplicate: {f}")
                  os.remove(f)
          print("Final packages:", sorted(keep))
          PYEOF
          echo "Final packages in dir:"
          ls -lh
          cd ../..
      - name: Download Prebuilt Pacman Cache
        run: |
          mkdir -p .github/pacman-cache
          for part in aa ab ac ad ae af; do
            wget -q https://github.com/zamkara/ark-aur/releases/download/latest/pacman-cache.tar.gz.part-$part || break
          done
          if ls pacman-cache.tar.gz.part-* 1>/dev/null 2>&1; then
            cat pacman-cache.tar.gz.part-* > pacman-cache.tar.gz
            tar -xzf pacman-cache.tar.gz -C .github/pacman-cache/
            rm pacman-cache.tar.gz.part-* pacman-cache.tar.gz
          fi
      - name: Cache Pacman Payload
        uses: actions/cache@v4
        with:
          path: .github/pacman-cache/
          key: ${{ runner.os }}-pacman-payload-${{ matrix.variant }}-${{ hashFiles('.github/Containerfile') }}
          restore-keys: |
            ${{ runner.os }}-pacman-payload-${{ matrix.variant }}-
            ${{ runner.os }}-pacman-payload-
      - name: Prepare Cache Dir
        run: mkdir -p .github/pacman-cache
      - name: Build custom ark image with bootupd
        run: |
          sudo podman build -v $(pwd)/.github/pacman-cache:/var/cache/pacman/pkg --build-arg AUR_SHA=${{ needs.check-digest.outputs.aur-sha }} --build-arg VARIANT=${{ matrix.variant }} -t ghcr.io/${{ github.repository }}:${{ matrix.variant }} -f .github/Containerfile .github/
          sudo chown -R $USER:$USER .github/pacman-cache/
      - name: Log in to the Container registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Push payload image to GHCR
        run: sudo podman push --compression-format zstd:chunked ghcr.io/${{ github.repository }}:${{ matrix.variant }}

      - name: Log in to Quay.io
        run: echo "${{ secrets.QUAY_PASSWORD }}" | sudo podman login quay.io -u ${{ secrets.QUAY_USERNAME }} --password-stdin

      - name: Push payload image to Quay.io
        run: |
          sudo podman tag ghcr.io/${{ github.repository }}:${{ matrix.variant }} quay.io/arklinux/gnome:${{ matrix.variant }}
          sudo podman push --compression-format zstd:chunked quay.io/arklinux/gnome:${{ matrix.variant }}

  update-cache:
    needs: [check-digest, build-payload]
    if: |
      !cancelled() &&
      needs.check-digest.outputs.needs-build == 'true' &&
      needs.build-payload.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Prepare cache content
        run: |
          {
            echo "${{ needs.check-digest.outputs.digest }}"
            echo "${{ needs.check-digest.outputs.aur-sha }}"
            echo "${{ needs.check-digest.outputs.alga-sha }}"
            date +%s
          } > digest-cache.txt
          cat digest-cache.txt

      - name: Save digest cache
        uses: actions/cache/save@v4
        with:
          path: digest-cache.txt
          key: ${{ env.CACHE_KEY_PREFIX }}-${{ github.run_id }}
